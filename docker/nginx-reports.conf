server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Browseable: lista archivos cuando se entra a un directorio.
    # En produccion sirve igual; si quieres ocultarlo, cambia a `off`.
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # HTML rendea inline en vez de descargarse.
    location / {
        try_files $uri $uri/ =404;
    }

    # Forzar download de joblib / xlsx (no son utiles inline).
    location ~ \.(joblib|xlsx|json)$ {
        add_header Content-Disposition 'attachment';
    }
}
