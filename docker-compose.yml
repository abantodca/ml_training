services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
      DEBUG: 0
    ports:
      - "4566:4566"   # endpoint S3 unico
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      retries: 10

  s3-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack: { condition: service_healthy }
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url=http://localstack:4566 s3 mb s3://ml-mlflow    || true &&
      aws --endpoint-url=http://localstack:4566 s3 mb s3://ml-artifacts || true &&
      aws --endpoint-url=http://localstack:4566 s3 mb s3://ml-data-raw  || true
      "

  mlflow:
    # Última estable a 2026-05-05. Ver ADR-005 sobre la política de pin
    # y la compatibilidad client/server entre majors.
    image: ghcr.io/mlflow/mlflow:v3.12.0
    depends_on:
      postgres: { condition: service_healthy }
      s3-init:  { condition: service_completed_successfully }
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://ml-mlflow/artifacts
    ports:
      - "5000:5000"

  trainer:
    build: .
    depends_on:
      mlflow: { condition: service_started }
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
      S3_ARTIFACTS_BUCKET: ml-artifacts
      S3_ARTIFACTS_PREFIX: artifacts
      S3_REPORTS_PREFIX: reports
    volumes:
      - ./data:/app/data:ro     # tu Excel local
    command: ["--varieties", "${VARIETIES:-POP}", "--tuning", "${TUNING:-smoke}"]

volumes:
  pg-data:
  localstack-data: