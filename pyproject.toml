[tool.ruff]
# Alineado con .editorconfig: Python 3.12, 4 spaces, 100 col.
line-length = 100
target-version = "py312"
extend-exclude = [
    ".terraform",
    ".ruff_cache",
    "mlruns",
    "artifacts",
    "logs",
    "data",
    "reports",
    "__pycache__",
]

[tool.ruff.lint]
# E/W = pycodestyle, F = pyflakes, I = isort, B = flake8-bugbear,
# UP = pyupgrade, SIM = flake8-simplify
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
# E501 (line-too-long) lo maneja el formatter, no el linter
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
