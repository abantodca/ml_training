# =============================================================================
# ml_training/Taskfile.yml — LOCAL-ONLY
# =============================================================================
#
# Pipeline de etapas (src/):
#   step_01_load       carga del acumulado / split por variedad
#   step_02_clean      limpieza, missing flags, outlier capping
#   step_03_features   ratios estructurales + ciclicas + lags + one-hot
#   step_04_train      tuning Optuna (XGB / LGB) + OOF ensemble + stacking GAM
#   step_05_evaluate   metricas + champion + dashboard ejecutivo
#   step_06_track      MLflow logging (file://mlruns)
#
# ENTORNO: corre en Windows / Linux local. MLflow file:// en ./mlruns.
#
# Uso normal:
#   task train VARIETIES=POP                           # entrena 1 variedad
#   task train VARIETIES=POP,VENTURA                   # entrena varias
#   task train VARIETIES=all                           # entrena todas
#
# Opciones avanzadas (train:local):
#   TUNING=smoke|dev|prod|prod_xl   (presupuesto Optuna; default: prod)
#   MODEL=auto|xgb|lgb              (default: auto = XGB + LGB, elige campeon)
#   PARALLEL=N                      (variedades en paralelo, default 1)
#   STACKING=none|gam               (default: none — GAM cae a fallback con x_subset actual)
#
# Otros:
#   task setup                                         # 1 vez tras clonar
#   task data:split                                    # genera training xlsx
#   task smoke                                         # ~1 min, POP, model auto
#   task mlflow:ui                                     # abre la UI local en :5000
#   task audit:compare -- --variety POP --last 5       # comparativa entre runs
# =============================================================================

version: "3"

# `.env` es opcional. Si no existe, los defaults sanos de config.py aplican.
dotenv: [ ".env" ]

vars:
  PY: "{{.PYTHON | default \"python\"}}"

  # BASH: forzamos Git Bash en Windows (no WSL). En Windows, 'bash' del PATH
  # suele ser el launcher de WSL, que no comparte filesystem/home con el resto
  # del proyecto. Git Bash usa el mismo $HOME que el resto del sistema.
  # En Linux/Mac esta variable es inofensiva si Git Bash no existe: el shell
  # cae al `bash` del PATH a traves de la regla de fallback de Task.
  BASH: "\"C:/Program Files/Git/usr/bin/bash.exe\""

  # Defaults overrideables por CLI:
  #   task train:local VARIETIES=VENTURA
  #   task train:local VARIETIES=all PARALLEL=4 TUNING=prod
  TUNING: "{{.TUNING | default \"prod\"}}"
  MODEL: "{{.MODEL | default \"auto\"}}"
  STACKING: "{{.STACKING | default \"none\"}}"
  VARIETIES: "{{.VARIETIES | default \"POP\"}}"
  PARALLEL: "{{.PARALLEL | default \"1\"}}"
  STAGE: "{{.STAGE | default \"\"}}"

tasks:

  # ═══ Ayuda ══════════════════════════════════════════════════════════════

  default:
    desc: Indice navegable (usa `task --list` para listado plano)
    silent: true
    cmds:
      - "{{.BASH}} scripts/sh/help.sh"

  setup:
    desc: Instala deps Python desde requirements.txt
    cmds:
      - "{{.PY}} -m pip install -r requirements.txt"

  # ═══ Datos ══════════════════════════════════════════════════════════════

  data:split:
    desc: "Split del Excel acumulado por VARIEDAD"
    cmds:
      - "{{.BASH}} scripts/sh/data_split.sh"

  # ═══ Cleanup local ══════════════════════════════════════════════════════

  clean:outputs:
    desc: "Borra artifacts/, logs/, reports/ y __pycache__/. NO toca data/ ni
      mlruns/"
    cmds:
      - "{{.BASH}} scripts/sh/clean_outputs.sh"

  clean:artifacts:
    desc: "Borra artifacts/ viejos conservando los ultimos N por (variety, model).
      Args: KEEP=10 [--dry-run]"
    vars:
      KEEP: "{{.KEEP | default \"10\"}}"
    cmds:
      - "{{.BASH}} scripts/sh/clean_artifacts.sh {{.KEEP}} {{.CLI_ARGS}}"

  # ═══ Training ═══════════════════════════════════════════════════════════
  # Uso:
  #   task train VARIETIES=POP             # una variedad
  #   task train VARIETIES=POP,VENTURA     # varias variedades
  #   task train VARIETIES=all             # todas
  #
  # Cada variedad es independiente: si una falla, las demas continuan.
  # Defaults: TUNING=prod, MODEL=auto (XGB + LGB, elige campeon por variedad).

  train:
    desc: "Entrena variedades. VARIETIES=POP|POP,VENTURA|all"
    env:
      MLFLOW_TRACKING_URI: ""
    cmds:
      - "{{.BASH}} scripts/sh/train_local.sh prod auto {{.VARIETIES}} 1
        {{.STACKING}}"

  # ═══ Feature importance (post-hoc, sin re-entrenar) ════════════════════
  # Corre permutation_importance contra el ULTIMO campeon registrado para
  # identificar features con importancia ~0 (candidatas a podar). No
  # re-entrena: solo carga el modelo de mlruns/ y permuta features sobre el
  # dataset. Tiempo: ~3-8 min con 10k filas.
  #
  # Uso:
  #   task features:importance VARIETY=POP
  #   task features:importance VARIETY=POP TOP=30 NREPEATS=5
  #   task features:importance VARIETY=POP SAMPLE=3000     # acelera iterando

  features:importance:
    desc: "Permutation importance del ultimo champion (VARIETY=POP)"
    vars:
      VARIETY: "{{.VARIETY | default \"POP\"}}"
      TOP: "{{.TOP | default \"25\"}}"
      NREPEATS: "{{.NREPEATS | default \"10\"}}"
      SAMPLE: "{{.SAMPLE | default \"0\"}}"
    cmds:
      - "{{.PY}} scripts/analyze_features.py --variety {{.VARIETY}}
        --top {{.TOP}} --n-repeats {{.NREPEATS}} --sample {{.SAMPLE}}"

  features:importance:retro:
    desc: "Permutation importance + log a MLflow + re-render Winner HTML (retroactivo, no re-entrena)"
    vars:
      VARIETY: "{{.VARIETY | default \"POP\"}}"
      NREPEATS: "{{.NREPEATS | default \"10\"}}"
    cmds:
      - "{{.PY}} scripts/analyze_features.py --variety {{.VARIETY}}
        --n-repeats {{.NREPEATS}} --log-to-mlflow --rerender-html"

  # ═══ MLflow UI (local) ══════════════════════════════════════════════════

  mlflow:ui:
    desc: "Abre la UI de MLflow local en http://localhost:5000 (Ctrl-C para cerrar)"
    cmds:
      - "{{.PY}} -m mlflow ui --backend-store-uri file:./mlruns --host 127.0.0.1
        --port 5000"

  # ═══ Logs / Auditoria ═══════════════════════════════════════════════════

  logs:local:
    desc: "tail al log del orquestador (logs/pipeline_run.log)"
    cmds:
      - "{{.BASH}} scripts/sh/logs_local.sh"

  logs:variety:
    desc: "tail al log de UNA variedad (VARIETY=POP)"
    vars:
      VARIETY: "{{default \"\" .VARIETY}}"
    cmds:
      - tail -f logs/variety_{{.VARIETY}}.log

  audit:compare:
    desc: "Tabla comparativa entre runs (lee logs/business_audit.jsonl). Args: --
      --variety POP --last 5"
    cmds:
      - "{{.BASH}} scripts/sh/audit_compare.sh {{.CLI_ARGS}}"
