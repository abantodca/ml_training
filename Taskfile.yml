# =============================================================================
# ml_training — Taskfile.yml
# Pipeline ML (XGB / LGB) con Optuna + MLflow Model Registry, sobre Docker.
# =============================================================================
#
# QUICK START (primera vez tras clonar):
#   task setup           Instala deps Python en el host (para data:split / IDE)
#   task data:split      Genera data/training/DB-HISTORICA.xlsx
#   task build           Build de la imagen + arranca servicios (postgres,
#                          mlflow, localstack). Imprime URLs al final.
#   task train           Entrena dentro del container (default POP smoke)
#                          UI MLflow: http://localhost:5000
#
# DIA A DIA:
#   task up                                 levanta servicios (sin rebuild)
#   task train VARIETIES=POP TUNING=prod    entrena con perfil de produccion
#   task logs                               tail logs de trainer + mlflow
#   task down                               detiene servicios (preserva data)
#
# VARIABLES (override por CLI, ej: `task train VARIETIES=POP,VENTURA`):
#   VARIETIES = "POP" | "POP,VENTURA" | "all"            (default POP)
#   TUNING    = smoke | dev | prod | prod_xl             (default prod)
#   MODEL     = auto | xgb | lgb | "xgb,lgb"             (default auto)
#   PARALLEL  = N variedades en paralelo                 (default 1)
#
# PERFILES DE TUNING (presupuesto Optuna):
#   smoke    ~1 min       2x2 CV    sanity check
#   dev      ~20 min      3x3 CV    baseline rapido
#   prod     ~1.5-2.5 h   5x3 CV    produccion (default)
#   prod_xl  ~5-6 h       6x3 CV    busqueda exhaustiva (overnight)
#
# Cada variedad es un proceso independiente: si una falla, las demas siguen.
# MODEL=auto entrena XGB y LGB y elige campeon por variedad (lex-order:
# gap -> MAPE -> tiempo). Los losers quedan soft-deleted en MLflow.
# =============================================================================

version: "3"

# `.env` es opcional. Si no existe, los defaults sanos de config.py aplican.
dotenv: [ ".env" ]

vars:
  PY: "{{.PYTHON | default \"python\"}}"

  # BASH: en Windows forzamos Git Bash (no WSL) para que comparta $HOME / FS
  # con el resto del proyecto. En Linux/Mac es inofensivo: Task cae al `bash`
  # del PATH si esta ruta no existe.
  BASH: "\"C:/Program Files/Git/usr/bin/bash.exe\""

  TUNING: "{{.TUNING | default \"prod\"}}"
  VARIETIES: "{{.VARIETIES | default \"POP\"}}"
  PARALLEL: "{{.PARALLEL | default \"1\"}}"

tasks:

  # ═══ Ayuda ══════════════════════════════════════════════════════════════

  default:
    desc: "Indice guiado del proyecto: workflow, ejemplos y URLs (vs `task --list`, que es listado plano alfabetico)"
    silent: true
    cmds:
      - |
        echo ""
        echo "============================================================================="
        echo " ml_training - pipeline ML (XGB / LGB) sobre Docker"
        echo "============================================================================="
        echo ""
        echo "PRIMERA VEZ (todo corre en Docker, sin Python en el host):"
        echo "   task build           Build de imagen + arranca servicios + URLs"
        echo "   task data:split      Genera DB-HISTORICA.xlsx (dentro del container)"
        echo ""
        echo "DIA A DIA:"
        echo "   task up                                     levanta servicios sin rebuild"
        echo "   task build                                  rebuild + up (tras cambio de codigo)"
        echo "   task eda VARIETIES=POP                      EDA estadistico (BP/DW/ADF/VIF/MI/PSI)"
        echo "   task train VARIETIES=POP TUNING=smoke       sanity check        (~1 min)"
        echo "   task train VARIETIES=POP TUNING=dev         baseline           (~20 min)"
        echo "   task train VARIETIES=all PARALLEL=3         todas en paralelo"
        echo "   task logs                                   tail trainer + mlflow"
        echo "   task down                                   detiene servicios"
        echo ""
        echo "   El sistema entrena XGB y LGB y elige el campeon por variedad."
        echo "   No se puede forzar un modelo: el contrato del proyecto es"
        echo "   que la maquina decida (lex-order: gap -> MAPE -> tiempo)."
        echo ""
        echo "VARIABLES (override por CLI):"
        echo "   VARIETIES = \"POP\" | \"POP,VENTURA\" | \"all\"            (default POP)"
        echo "   TUNING    = smoke (~1m) | dev (~20m) | prod (~2h) | prod_xl (~6h)"
        echo "   PARALLEL  = N variedades en paralelo                  (default 1)"
        echo ""
        echo "URLS (servicios up):"
        echo "   http://localhost:5000              MLflow UI (tracking + Registry)"
        echo "   http://localhost:8080/reports/     Dashboards HTML por variedad"
        echo "   http://localhost:8080/artifacts/   joblib + run_summary + best_params"
        echo "   s3://...                           Backend de artifacts MLflow (S3 real)"
        echo ""
        echo "CLEANUP:   task clean:docker  |  task clean:outputs  |  task clean:artifacts"
        echo ""
        echo "   Tip: task --list    listado plano de TODAS las tasks (audit, cleanup, ...)"
        echo "============================================================================="
        echo ""

  # ═══ Datos ══════════════════════════════════════════════════════════════

  data:split:
    desc: "Genera data/training/DB-HISTORICA.xlsx desde data/BD_HISTORICO_ACUMULADO.xlsx. Corre dentro del container (no requiere Python en el host)"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m scripts.prepare_data
        --input  data/BD_HISTORICO_ACUMULADO.xlsx
        --output data/training/DB-HISTORICA.xlsx
        --min-rows 100

  # ═══ EDA / Diagnostico ══════════════════════════════════════════════════

  eda:
    desc: "EDA estadistico standalone (Shapiro/AD/JB, BP/White, ACF/PACF/DW/LB, ADF/KPSS, VIF, MI, PSI). Args: VARIETIES=POP. Genera reports/EDA_<variety>_<ts>.html"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m src.diagnostics.eda
        --variety {{.VARIETIES}}

  # ═══ Docker stack ═══════════════════════════════════════════════════════
  # Servicios:
  #   postgres   backend de MLflow (metadata + Model Registry)
  #   mlflow     tracking server v3.12 (UI en :5000, artifacts -> S3 real)
  #   reports    nginx static (sirve reports/ y artifacts/ del host en :8080)
  #   trainer    imagen del pipeline (one-shot, se invoca via `task train`)
  #
  # Storage de artifacts: S3 real (parametrizado en .env via S3_MLFLOW_BUCKET y
  # S3_ARTIFACTS_BUCKET). Los buckets deben existir antes de `task up`. Ver
  # .env.example o GUIA_MLOPS_AWS.md §3 para crearlos.

  build:
    desc: "Rebuild de la imagen del trainer + arranca TODOS los servicios. Usar tras cambios de codigo o requirements"
    cmds:
      - docker compose build trainer
      - docker compose up -d postgres mlflow reports
      - task: _print_urls

  up:
    desc: "Levanta todos los servicios sin rebuild (postgres + mlflow + reports). Para arranque diario"
    cmds:
      - docker compose up -d postgres mlflow reports
      - task: _print_urls

  down:
    desc: "Detiene los servicios. Preserva volumen Postgres (los artifacts viven en S3 real, no se tocan)"
    cmds:
      - docker compose down

  clean:docker:
    desc: "DESTRUCTIVO: detiene servicios y borra volumen Postgres. Pierde TODO el historial MLflow (metadata). Los artifacts en S3 real NO se tocan. La imagen del trainer se conserva"
    cmds:
      - docker compose down -v

  logs:
    desc: "tail en vivo de logs Docker (trainer + mlflow). Ctrl-C para salir"
    cmds:
      - docker compose logs -f --tail=200 trainer mlflow

  _print_urls:
    internal: true
    silent: true
    cmds:
      - 'echo ""'
      - 'echo "==============================================================="'
      - 'echo " Servicios listos:"'
      - 'echo "   MLflow UI       http://localhost:5000   (tracking + Registry)"'
      - 'echo "   Reports / HTML  http://localhost:8080/reports/   (dashboards)"'
      - 'echo "   Artifacts       http://localhost:8080/artifacts/ (joblib/json)"'
      - 'echo "   S3 backend      s3://${S3_MLFLOW_BUCKET}/   (real AWS, region ${AWS_DEFAULT_REGION:-us-east-1})"'
      - 'echo "==============================================================="'
      - 'echo ""'

  # ═══ Training ══════════════════════════════════════════════════════════

  train:
    desc: "Entrena dentro del container. Vars: VARIETIES TUNING PARALLEL. El sistema entrena XGB y LGB y elige el campeon (no se puede forzar un modelo). Si cambiaste codigo, corre `task build` primero"
    deps: [up]
    cmds:
      - docker compose run --rm trainer
        --varieties {{.VARIETIES}}
        --tuning {{.TUNING}}
        --parallel-varieties {{.PARALLEL}}

  # ═══ Reports dashboard ════════════════════════════════════════════════════

  reports:dashboard:
    desc: "Regenera reports/index.html (dashboard unificado con sidebar de todos los HTML/Excel/JSON). Abre en http://localhost:8080/reports/index.html"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m src.diagnostics.dashboard_index

  # ═══ Auditoria ══════════════════════════════════════════════════════════

  audit:compare:
    desc: "Tabla comparativa entre runs (lee logs/business_audit.jsonl). Args: -- --variety POP --last 5"
    cmds:
      - "{{.BASH}} scripts/sh/audit_compare.sh {{.CLI_ARGS}}"

  # ═══ Cleanup local ══════════════════════════════════════════════════════

  clean:outputs:
    desc: "Borra artifacts/, logs/, reports/ y __pycache__/ del host. NO toca data/ ni el volumen Postgres ni S3"
    cmds:
      - "{{.BASH}} scripts/sh/clean_outputs.sh"

  clean:artifacts:
    desc: "Borra artifacts/ viejos conservando los ultimos N por (variety, model). Args: KEEP=10 [--dry-run]"
    vars:
      KEEP: "{{.KEEP | default \"10\"}}"
    cmds:
      - "{{.BASH}} scripts/sh/clean_artifacts.sh {{.KEEP}} {{.CLI_ARGS}}"
