# =============================================================================
# ml_training — Taskfile.yml
# Pipeline ML (XGB / LGB) con Optuna + MLflow Model Registry, sobre Docker.
# =============================================================================
#
# PRIMERA VEZ (setup inicial, ejecutar en orden — todo corre en Docker):
#   task build                                  Build de imagen + arranca servicios + URLs
#   task data:split                             Genera DB-HISTORICA.xlsx (dentro del container)
#   task eda VARIETIES=POP                      EDA estadistico (BP/DW/ADF/VIF/MI/PSI)
#   task train VARIETIES=POP TUNING=smoke       primer sanity check (~1 min)
#
# DIA A DIA (servicios ya construidos):
#   task up                                     levanta servicios sin rebuild
#   task train VARIETIES=POP TUNING=dev         baseline           (~20 min)
#   task train VARIETIES=POP TUNING=prod        produccion         (~2 h)
#   task train VARIETIES=all PARALLEL=3         todas en paralelo
#   task logs                                   tail trainer + mlflow
#   task reports:dashboard                      regenera reports/index_static.html (snapshot)
#   task down                                   detiene servicios
#
# TRAS CAMBIO DE CODIGO O REQUIREMENTS:
#   task build                                  rebuild imagen + up
#
# El sistema entrena XGB y LGB y elige el campeon por variedad.
# No se puede forzar un modelo: el contrato del proyecto es
# que la maquina decida (lex-order: gap -> MAPE -> tiempo).
#
# VARIABLES (override por CLI, ej: `task train VARIETIES=POP,VENTURA`):
#   VARIETIES = "POP" | "POP,VENTURA" | "all"            (default POP)
#   TUNING    = smoke (~1m) | dev (~20m) | prod (~2h) | prod_xl (~6h)
#   PARALLEL  = N variedades en paralelo                  (default 1)
#
# PERFILES DE TUNING (presupuesto Optuna):
#   smoke    ~1 min       2x2 CV    sanity check
#   dev      ~20 min      3x3 CV    baseline rapido
#   prod     ~1.5-2.5 h   5x3 CV    produccion (default)
#   prod_xl  ~5-6 h       6x3 CV    busqueda exhaustiva (overnight)
#
# URLS (servicios up):
#   http://localhost:5000              MLflow UI (tracking + Registry)
#   http://localhost:8080/reports/     Dashboards HTML por variedad
#   http://localhost:8080/artifacts/   joblib + run_summary + best_params
#   s3://...                           Backend de artifacts MLflow (S3 real)
#
# CLEANUP:   task clean:docker   (DESTRUCTIVO: borra volumen Postgres)
#
# Cada variedad es un proceso independiente: si una falla, las demas siguen.
#
# NOTA: Para PRODUCCION AWS (deploy, build a ECR, batch, lifecycle), ver
# GUIA_MLOPS_AWS_V2.md §4. La guia detalla como anadir un bloque `includes:`
# a este Taskfile y crear `tasks/*.yml` por dominio (infra/ecr/batch/cluster/
# mlflow-aws/aws). Despues de seguir la guia, `task --list` mostrara ambos:
# tasks locales (build, train, ...) y tasks AWS namespaced (infra:apply,
# ecr:build-all, batch:retrain, ...).
# =============================================================================

version: "3"

# `.env` es opcional. Si no existe, los defaults sanos de config.py aplican.
dotenv: [ ".env" ]

# === ANADIR despues del bloque dotenv existente ===
# Modulos AWS por dominio. Cada include prefija con su namespace, asi las
# tasks locales (build, up, train, ...) no chocan con las AWS (infra:apply,
# ecr:build, ...).
includes:
  infra:
    taskfile: ./tasks/infra.yml
  ecr:
    taskfile: ./tasks/ecr.yml
  batch:
    taskfile: ./tasks/batch.yml
  cluster:
    taskfile: ./tasks/cluster.yml
  mlflow-aws:
    taskfile: ./tasks/mlflow_registry.yml
  aws:
    taskfile: ./tasks/aws.yml
    
vars:
  TUNING: "{{.TUNING | default \"prod\"}}"
  VARIETIES: "{{.VARIETIES | default \"POP\"}}"
  PARALLEL: "{{.PARALLEL | default \"1\"}}"
  PROJECT: "{{.PROJECT | default \"ml-training\"}}"

tasks:

  # ═══ Ayuda ══════════════════════════════════════════════════════════════

  default:
    desc: "Quick-start guiado para nuevos usuarios. Mas detalle: `task help` (local) o `task help:aws` (produccion)"
    silent: true
    cmds:
      - |
        echo ""
        echo "==================================================================="
        echo " ml_training - predice productividad de cosecha por variedad"
        echo "==================================================================="
        echo ""
        echo " QUE HACE: Entrena modelos ML (XGBoost + LightGBM) para predecir"
        echo " kg/jornal-hora por variedad. El sistema elige automaticamente"
        echo " el mejor algoritmo. Dos entornos:"
        echo ""
        echo "   [LOCAL]  Docker en tu maquina - desarrollo + experimentos"
        echo "   [AWS]    Produccion en la nube - batch training + registry"
        echo ""
        echo " ================================================================="
        echo " [LOCAL] PRIMERA VEZ (ejecuta en orden, copia y pega linea x linea):"
        echo " ================================================================="
        echo ""
        echo "   1) task build                              construye el entorno (5-10 min)"
        echo "   2) task data:split                         prepara los datos historicos"
        echo "   3) task eda VARIETIES=POP                  revisa la calidad de los datos"
        echo "   4) task train VARIETIES=POP TUNING=smoke   prueba rapida (~1 min) para"
        echo "                                              confirmar que todo corre OK"
        echo ""
        echo " ================================================================="
        echo " [LOCAL] DIA A DIA (entorno ya construido):"
        echo " ================================================================="
        echo ""
        echo "   task up                                       enciende los servicios"
        echo "   task train VARIETIES=POP TUNING=prod          entrenamiento real (~2 h)"
        echo "   task train VARIETIES=all PARALLEL=3           todas las variedades en paralelo"
        echo "   task logs                                     ver progreso del entrenamiento"
        echo "   task down                                     apaga los servicios al terminar"
        echo ""
        echo "   Resultados (servicios encendidos):"
        echo "     http://localhost:5000           MLflow: ranking de entrenamientos"
        echo "     http://localhost:8080/reports/  Dashboards HTML por variedad"
        echo ""
        echo " ================================================================="
        echo " [AWS] PRODUCCION (requiere credenciales AWS configuradas):"
        echo " ================================================================="
        echo ""
        echo "   task aws:deploy                               stand-up completo del stack"
        echo "   task aws:wake  /  task aws:sleep              encender / apagar stack"
        echo "   task batch:train VARIETIES=POP TUNING=prod    entrenar en AWS Batch"
        echo "   task mlflow-aws:promote VARIETY=POP VERSION=N promover modelo a Production"
        echo ""
        echo "   task help:aws                                 referencia AWS completa"
        echo ""
        echo " -----------------------------------------------------------------"
        echo " GLOSARIO RAPIDO (parametros comunes a LOCAL y AWS):"
        echo " -----------------------------------------------------------------"
        echo ""
        echo "   VARIETIES   que variedades entrenar: POP, VENTURA, JUPITER, ... o 'all'"
        echo "   TUNING      cuanto tarda buscando el mejor modelo:"
        echo "                  smoke    ~1 min    prueba rapida de que todo corre"
        echo "                  dev      ~20 min   baseline para iterar codigo/features"
        echo "                  prod     ~2 h      entrenamiento de produccion (default)"
        echo "                  prod_xl  ~6 h      busqueda exhaustiva (overnight)"
        echo "   PARALLEL    cuantas variedades entrenar al mismo tiempo (default 1)"
        echo ""
        echo "   Ejemplo: task train VARIETIES=POP,VENTURA TUNING=dev PARALLEL=2"
        echo ""
        echo " -----------------------------------------------------------------"
        echo " MAS COMANDOS:"
        echo " -----------------------------------------------------------------"
        echo ""
        echo "   task help          referencia completa LOCAL (Docker en tu maquina)"
        echo "   task help:aws      referencia completa AWS  (produccion en la nube)"
        echo "   task --list        listado plano de TODOS los comandos disponibles"
        echo ""
        echo "==================================================================="
        echo ""

  help:
    desc: "Referencia completa local: workflow, variables, URLs, cleanup. Para AWS: `task help:aws`"
    silent: true
    cmds:
      - |
        echo ""
        echo "==================================================================="
        echo " ml_training - referencia completa (comandos locales)"
        echo "==================================================================="
        echo ""
        echo "PRIMERA VEZ (setup inicial, ejecutar en orden):"
        echo "   task build                                  imagen + servicios + URLs"
        echo "   task data:split                             Genera DB-HISTORICA.xlsx"
        echo "   task eda VARIETIES=POP                      EDA estadistico (BP/DW/ADF/VIF/MI/PSI)"
        echo "   task train VARIETIES=POP TUNING=smoke       primer sanity check (~1 min)"
        echo ""
        echo "DIA A DIA (servicios ya construidos):"
        echo "   task up                                     levanta servicios sin rebuild"
        echo "   task train VARIETIES=POP TUNING=dev         baseline           (~20 min)"
        echo "   task train VARIETIES=POP TUNING=prod        produccion         (~2 h)"
        echo "   task train VARIETIES=all PARALLEL=3         todas en paralelo"
        echo "   task logs                                   tail trainer + mlflow"
        echo "   task reports:dashboard                      regenera reports/index_static.html"
        echo "   task down                                   detiene servicios"
        echo ""
        echo "TRAS CAMBIO DE CODIGO O REQUIREMENTS:"
        echo "   task build                                  rebuild imagen + up"
        echo ""
        echo "   El sistema entrena XGB y LGB y elige el campeon por variedad."
        echo "   No se puede forzar un modelo: el contrato del proyecto es"
        echo "   que la maquina decida (lex-order: gap -> MAPE -> tiempo)."
        echo ""
        echo "VARIABLES (override por CLI):"
        echo "   VARIETIES = \"POP\" | \"POP,VENTURA\" | \"all\"            (default POP)"
        echo "   TUNING    = smoke (~1m) | dev (~20m) | prod (~2h, default) | prod_xl (~6h)"
        echo "   PARALLEL  = N variedades en paralelo                  (default 1)"
        echo ""
        echo "URLS (servicios up):"
        echo "   http://localhost:5000              MLflow UI (tracking + Registry)"
        echo "   http://localhost:8080/reports/     Dashboards HTML por variedad"
        echo "   http://localhost:8080/artifacts/   joblib + run_summary + best_params"
        echo "   s3://...                           Backend de artifacts MLflow (S3 real)"
        echo ""
        echo "CLEANUP local:   task clean:docker   (DESTRUCTIVO: borra volumen Postgres)"
        echo ""
        echo "Para comandos de produccion en AWS:  task help:aws"
        echo "==================================================================="
        echo ""

  help:aws:
    desc: "Comandos de produccion en AWS: infra, ECR, Batch, lifecycle, registry, destructivos"
    silent: true
    cmds:
      - |
        echo ""
        echo "==================================================================="
        echo " ml_training - PRODUCCION AWS"
        echo " (tasks namespaced: infra: ecr: batch: cluster: mlflow-aws: aws:)"
        echo "==================================================================="
        echo ""
        echo "ATAJOS HIGH-LEVEL (encadenan otros namespaces):"
        echo "   task aws:deploy                             stand-up completo (storage + 3 imgs + resto)"
        echo "   task aws:smoke                              deploy + smoke test (~1 min)"
        echo "   task aws:wake                               encender stack (scale-up + wait-healthy)"
        echo "   task aws:sleep                              apagar stack (scale-down)"
        echo "   task aws:status                             outputs Terraform + cluster status"
        echo ""
        echo "INFRA (Terraform):"
        echo "   task infra:bootstrap                        backend S3 + DynamoDB lock (UNA VEZ)"
        echo "   task infra:bootstrap-oidc                   rol GitHub Actions via OIDC (UNA VEZ)"
        echo "   task infra:plan [TARGET=module.X]           ver cambios"
        echo "   task infra:apply [TARGET=module.X]          aplicar (parcial o full)"
        echo "   task infra:output                           outputs (alb_dns, ecr_urls, ...)"
        echo "   task infra:validate                         fmt -check + validate (pre-commit)"
        echo ""
        echo "IMAGENES (ECR):"
        echo "   task ecr:build-all                          build + push las 3 imagenes"
        echo "   task ecr:build IMG=trainer [TAG=v1.2.3]     build + push UNA imagen (trainer|mlflow|reports)"
        echo "   task ecr:list                               listar tags en ECR"
        echo ""
        echo "TRAINING EN BATCH:"
        echo "   task batch:train VARIETIES=POP TUNING=prod  entrenar en AWS Batch (espera SUCCEEDED)"
        echo "   task batch:smoke                            sanity check (POP + smoke, ~1 min)"
        echo "   task batch:status                           jobs activos (spot + ondemand)"
        echo "   task batch:cancel JOB_ID=<id>               terminar job RUNNING/PENDING"
        echo ""
        echo "CLUSTER LIFECYCLE:"
        echo "   task cluster:status                         estado RDS + ECS + Batch"
        echo "   task cluster:scale-up / scale-down          encender / apagar (preserva infra)"
        echo "   task cluster:wait-healthy                   polling ALB hasta 200 (timeout 10 min)"
        echo "   task cluster:teardown / rebuild             destroy / restore modulos volatiles"
        echo ""
        echo "MLFLOW REGISTRY (AWS):"
        echo "   task mlflow-aws:list-versions VARIETY=POP   listar versiones del modelo"
        echo "   task mlflow-aws:current-prod  VARIETY=POP   version Production actual"
        echo "   task mlflow-aws:promote VARIETY=POP VERSION=N [MAX_MAPE=20]"
        echo "                                               promover a Production con gate MAPE"
        echo ""
        echo "DESTRUCTIVO AWS:"
        echo "   task aws:teardown                           destroy volatiles (preserva storage + VPC)"
        echo "   task aws:destroy                            TOTAL: borra S3 + ECR + RDS, irreversible"
        echo ""
        echo "DOC AWS COMPLETA: GUIA_MLOPS_AWS_V2.md secciones 4-9 (runbook + troubleshooting)"
        echo "==================================================================="
        echo ""

  # ═══ Datos ══════════════════════════════════════════════════════════════

  data:split:
    desc: "Genera data/training/DB-HISTORICA.xlsx desde data/BD_HISTORICO_ACUMULADO.xlsx. Corre dentro del container (no requiere Python en el host)"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m scripts.prepare_data
        --input  data/BD_HISTORICO_ACUMULADO.xlsx
        --output data/training/DB-HISTORICA.xlsx
        --min-rows 100

  # ═══ EDA / Diagnostico ══════════════════════════════════════════════════

  eda:
    desc: "EDA estadistico standalone (Shapiro/AD/JB, BP/White, ACF/PACF/DW/LB, ADF/KPSS, VIF, MI, PSI). Args: VARIETIES=POP. Genera reports/EDA_<variety>_<ts>.html"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m src.diagnostics.eda
        --variety {{.VARIETIES}}

  # ═══ Docker stack ═══════════════════════════════════════════════════════
  # Servicios:
  #   postgres   backend de MLflow (metadata + Model Registry)
  #   mlflow     tracking server v3.12 (UI en :5000, artifacts -> S3 real)
  #   reports    nginx static (sirve reports/ y artifacts/ del host en :8080)
  #   trainer    imagen del pipeline (one-shot, se invoca via `task train`)
  #
  # Storage de artifacts: S3 real (parametrizado en .env via S3_MLFLOW_BUCKET y
  # S3_ARTIFACTS_BUCKET). Los buckets deben existir antes de `task up`. Ver
  # .env.example o GUIA_MLOPS_AWS.md §3 para crearlos.

  build:
    desc: "Rebuild de la imagen del trainer + arranca TODOS los servicios. Usar tras cambios de codigo o requirements"
    cmds:
      - task: _ensure_dirs
      - docker compose build trainer
      - docker compose up -d postgres mlflow reports
      - task: _print_urls

  up:
    desc: "Levanta todos los servicios sin rebuild (postgres + mlflow + reports). Para arranque diario"
    cmds:
      - task: _ensure_dirs
      - docker compose up -d postgres mlflow reports
      - task: _print_urls

  _ensure_dirs:
    internal: true
    silent: true
    # Crea los bind-mount targets antes de levantar Docker, evitando que el
    # compose los recree con permisos root (Linux) o falle el primer
    # write del container con uid 1001 (mluser).
    cmds:
      - mkdir -p artifacts reports logs data/training

  down:
    desc: "Detiene los servicios. Preserva volumen Postgres (los artifacts viven en S3 real, no se tocan)"
    cmds:
      - docker compose down

  clean:docker:
    desc: "DESTRUCTIVO: detiene servicios y borra volumen Postgres. Pierde TODO el historial MLflow (metadata). Los artifacts en S3 real NO se tocan. La imagen del trainer se conserva"
    cmds:
      - docker compose down -v

  logs:
    desc: "tail en vivo de logs Docker (trainer + mlflow). Ctrl-C para salir"
    cmds:
      - docker compose logs -f --tail=200 trainer mlflow

  _print_urls:
    internal: true
    silent: true
    cmds:
      - 'echo ""'
      - 'echo "==============================================================="'
      - 'echo " Servicios listos:"'
      - 'echo "   MLflow UI       http://localhost:5000   (tracking + Registry)"'
      - 'echo "   Reports / HTML  http://localhost:8080/reports/   (dashboards)"'
      - 'echo "   Artifacts       http://localhost:8080/artifacts/ (joblib/json)"'
      - 'echo "   S3 backend      s3://${S3_MLFLOW_BUCKET}/   (real AWS, region ${AWS_DEFAULT_REGION:-us-east-1})"'
      - 'echo "==============================================================="'
      - 'echo ""'

  # ═══ Training ══════════════════════════════════════════════════════════

  train:
    desc: "Entrena dentro del container. Vars: VARIETIES TUNING PARALLEL. El sistema entrena XGB y LGB y elige el campeon (no se puede forzar un modelo). Si cambiaste codigo, corre `task build` primero"
    deps: [up]
    vars:
      # Capturamos el git SHA del host AHORA y lo pasamos al container
      # via env var. El container no monta .git/ (excluido por .dockerignore)
      # asi que sin esto run_metadata loggea git_commit=unknown.
      # Sintaxis POSIX (mvdan/sh interpreter de Task, cross-platform).
      GIT_SHA:
        sh: git rev-parse HEAD 2>/dev/null || echo unknown
      GIT_DIRTY:
        sh: git diff --quiet HEAD 2>/dev/null && echo false || echo true
    cmds:
      - docker compose run --rm
        -e GIT_SHA={{.GIT_SHA}}
        -e GIT_DIRTY={{.GIT_DIRTY}}
        trainer
        --varieties {{.VARIETIES}}
        --tuning {{.TUNING}}
        --parallel-varieties {{.PARALLEL}}

  # ═══ Reports dashboard ════════════════════════════════════════════════════

  reports:dashboard:
    desc: "Regenera reports/index_static.html (snapshot estatico, no pisa el index.html JS-dinamico). Para emailar / archivar / abrir via file://"
    cmds:
      - docker compose run --rm --no-deps --entrypoint python trainer
        -m src.diagnostics.dashboard_index
