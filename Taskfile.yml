# =============================================================================
# ml_training/Taskfile.yml — LOCAL-ONLY
# =============================================================================
#
# Pipeline de etapas (src/):
#   step_01_load       carga del acumulado / split por variedad
#   step_02_clean      limpieza, missing flags, outlier capping (per-FUNDO)
#   step_03_features   ratios estructurales + ciclicas + lags + one-hot
#   step_04_train      tuning Optuna (XGB / LGB) + OOF ensemble (K=5)
#   step_05_evaluate   metricas + champion lex-order + dashboard ejecutivo
#   step_06_track      MLflow logging (sqlite:///mlruns/mlflow.db + Registry)
#
# ENTORNO: corre en Windows / Linux local. MLflow sqlite en mlruns/mlflow.db.
#
# Uso normal:
#   task train VARIETIES=POP                           # entrena 1 variedad
#   task train VARIETIES=POP TUNING=dev                # baseline rapido (~20 min)
#   task train VARIETIES=POP TUNING=prod               # produccion (~1.5h)
#   task train VARIETIES=POP,VENTURA                   # varias variedades
#   task train VARIETIES=all                           # todas
#
# Variables overrideables por CLI (defaults vienen aqui mismo):
#   VARIETIES = lista CSV de variedades o "all" (default POP)
#   TUNING    = smoke (~1 min) | dev (~20 min) |
#               prod (~1.5h, default) | prod_xl (~2.5h)
#   MODEL     = auto (default, xgb + lgb compiten lex-order) | xgb | lgb |
#               combinaciones CSV ("xgb,lgb")
#   PARALLEL  = variedades a entrenar en paralelo (default 1).
#               2-4 segun cores. >1 setea automaticamente MODEL_N_JOBS=1
#               para evitar oversubscription.
#
# Otros:
#   task setup                                         # 1 vez tras clonar
#   task data:split                                    # genera training xlsx
#   task mlflow:ui                                     # UI en localhost:5000 (sqlite)
#   task audit:compare -- --variety POP --last 5       # comparativa entre runs
# =============================================================================

version: "3"

# `.env` es opcional. Si no existe, los defaults sanos de config.py aplican.
dotenv: [ ".env" ]

vars:
  PY: "{{.PYTHON | default \"python\"}}"

  # BASH: forzamos Git Bash en Windows (no WSL). En Windows, 'bash' del PATH
  # suele ser el launcher de WSL, que no comparte filesystem/home con el resto
  # del proyecto. Git Bash usa el mismo $HOME que el resto del sistema.
  # En Linux/Mac esta variable es inofensiva si Git Bash no existe: el shell
  # cae al `bash` del PATH a traves de la regla de fallback de Task.
  BASH: "\"C:/Program Files/Git/usr/bin/bash.exe\""

  # Defaults overrideables por CLI:
  #   task train:local VARIETIES=VENTURA
  #   task train:local VARIETIES=all PARALLEL=4 TUNING=prod
  TUNING: "{{.TUNING | default \"prod\"}}"
  MODEL: "{{.MODEL | default \"auto\"}}"
  VARIETIES: "{{.VARIETIES | default \"POP\"}}"
  PARALLEL: "{{.PARALLEL | default \"1\"}}"
  STAGE: "{{.STAGE | default \"\"}}"

tasks:

  # ═══ Ayuda ══════════════════════════════════════════════════════════════

  default:
    desc: Indice navegable (usa `task --list` para listado plano)
    silent: true
    cmds:
      - "{{.BASH}} scripts/sh/help.sh"

  setup:
    desc: Instala deps Python desde requirements.txt
    cmds:
      - "{{.PY}} -m pip install -r requirements.txt"

  # ═══ Datos ══════════════════════════════════════════════════════════════

  data:split:
    desc: "Split del Excel acumulado por VARIEDAD"
    cmds:
      - "{{.BASH}} scripts/sh/data_split.sh"

  # ═══ Cleanup local ══════════════════════════════════════════════════════

  clean:outputs:
    desc: "Borra artifacts/, logs/, reports/ y __pycache__/. NO toca data/ ni
      mlruns/"
    cmds:
      - "{{.BASH}} scripts/sh/clean_outputs.sh"

  clean:artifacts:
    desc: "Borra artifacts/ viejos conservando los ultimos N por (variety, model).
      Args: KEEP=10 [--dry-run]"
    vars:
      KEEP: "{{.KEEP | default \"10\"}}"
    cmds:
      - "{{.BASH}} scripts/sh/clean_artifacts.sh {{.KEEP}} {{.CLI_ARGS}}"

  # ═══ Training ═══════════════════════════════════════════════════════════
  # Uso:
  #   task train VARIETIES=POP                   # una variedad (TUNING=prod)
  #   task train VARIETIES=POP TUNING=dev        # baseline rapido (~20 min)
  #   task train VARIETIES=POP MODEL=lgb         # solo LGB
  #   task train VARIETIES=POP,VENTURA           # varias variedades
  #   task train VARIETIES=all PARALLEL=3        # todas, 3 en paralelo
  #
  # Cada variedad es independiente: si una falla, las demas continuan.
  # Defaults: TUNING=prod, MODEL=auto (xgb + lgb compiten lex-order),
  # PARALLEL=1.

  train:
    desc: "Entrena variedades. Vars: VARIETIES=POP|POP,VENTURA|all  TUNING=smoke|dev|prod|prod_xl  MODEL=auto|lgb|xgb|xgb,lgb  PARALLEL=N"
    env:
      MLFLOW_TRACKING_URI: ""
    cmds:
      - "{{.BASH}} scripts/sh/train_local.sh {{.TUNING}} {{.MODEL}} {{.VARIETIES}} {{.PARALLEL}}"

  # ═══ MLflow UI (local) ══════════════════════════════════════════════════

  mlflow:ui:
    desc: "Abre la UI de MLflow local en http://localhost:5000 (Ctrl-C para cerrar)"
    cmds:
      - "{{.PY}} -m mlflow ui
        --backend-store-uri sqlite:///mlruns/mlflow.db
        --default-artifact-root file:./mlruns/artifacts
        --host 127.0.0.1 --port 5000"

  # ═══ Logs / Auditoria ═══════════════════════════════════════════════════

  logs:local:
    desc: "tail al log del orquestador (logs/pipeline_run.log)"
    cmds:
      - "{{.BASH}} scripts/sh/logs_local.sh"

  logs:variety:
    desc: "tail al log de UNA variedad (VARIETY=POP)"
    vars:
      VARIETY: "{{default \"\" .VARIETY}}"
    cmds:
      - tail -f logs/variety_{{.VARIETY}}.log

  audit:compare:
    desc: "Tabla comparativa entre runs (lee logs/business_audit.jsonl). Args: --
      --variety POP --last 5"
    cmds:
      - "{{.BASH}} scripts/sh/audit_compare.sh {{.CLI_ARGS}}"
